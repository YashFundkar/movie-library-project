<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Library</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <!-- Heading -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">
            <i class="bi bi-film"></i> Movie Library
        </h1>
        <p class="text-muted">
            Manage, Search and Filter Your Favorite Movies
        </p>
    </div>

    <!-- Add Movie Form -->
    <div class="card shadow-sm mb-4">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="bi bi-plus-circle"></i> Add Movie
            </h5>
        </div>

        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-4">
                    <input
                        type="text"
                        id="title"
                        class="form-control"
                        placeholder="Movie Title">
                </div>

                <div class="col-md-4">
                    <input
                        type="text"
                        id="genre"
                        class="form-control"
                        placeholder="Genre">
                </div>

                <div class="col-md-2">
                    <input
                        type="number"
                        id="rating"
                        class="form-control"
                        placeholder="Rating">
                </div>

                <div class="col-md-2 d-grid">
                    <button
                        onclick="addMovie()"
                        class="btn btn-success">
                        Add
                    </button>
                </div>

            </div>

        </div>
    </div>

    <!-- Search & Filter -->
    <div class="card shadow-sm mb-4">

        <div class="card-header bg-dark text-white">
            <h5 class="mb-0">
                <i class="bi bi-search"></i> Search & Filter
            </h5>
        </div>

        <div class="card-body">

            <div class="row g-3">

                <div class="col-md-8">
                    <input
                        type="text"
                        id="search"
                        class="form-control"
                        placeholder="Search movie by title..."
                        onkeyup="searchMovie()">
                </div>

                <div class="col-md-4">
                    <select
                        class="form-select"
                        id="genreFilter"
                        onchange="filterGenre()">

                        <option value="">All Genres</option>
                        <option>Action</option>
                        <option>Comedy</option>
                        <option>Drama</option>
                        <option>Horror</option>
                        <option>Sci-Fi</option>
                    </select>
                </div>

            </div>

        </div>
    </div>

    <!-- Statistics -->
    <div class="row mb-4">

        <div class="col-md-4 mb-3">
            <div class="card text-center border-primary">
                <div class="card-body">
                    <h6>Total Movies</h6>
                    <h3 id="totalMovies">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center border-success">
                <div class="card-body">
                    <h6>Average Rating</h6>
                    <h3 id="avgRating">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4 mb-3">
            <div class="card text-center border-warning">
                <div class="card-body">
                    <h6>Genres</h6>
                    <h3 id="genreCount">0</h3>
                </div>
            </div>
        </div>

    </div>

    <!-- Movie List -->
    <div class="card shadow-sm">

        <div class="card-header bg-secondary text-white">
            <h5 class="mb-0">
                <i class="bi bi-collection-play"></i>
                Movie Collection
            </h5>
        </div>

        <div class="card-body">

            <div id="movies" class="row g-3">

                <!-- Example Movie Card -->

                <div class="col-md-4 movie-card">

                    <div class="card h-100">

                        <div class="card-body">

                            <h5 class="card-title">
                                Avengers Endgame
                            </h5>

                            <p>
                                <span class="badge bg-info">
                                    Action
                                </span>
                            </p>

                            <p>
                                <span class="badge bg-warning text-dark">
                                    ⭐ 9/10
                                </span>
                            </p>

                            <div class="d-flex gap-2">

                                <button
                                    class="btn btn-warning btn-sm">
                                    Edit
                                </button>

                                <button
                                    class="btn btn-danger btn-sm">
                                    Delete
                                </button>

                            </div>

                        </div>

                    </div>

                </div>

            </div>

        </div>
    </div>

    <!-- Pagination -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">

            <li class="page-item disabled">
                <a class="page-link">Previous</a>
            </li>

            <li class="page-item active">
                <a class="page-link">1</a>
            </li>

            <li class="page-item">
                <a class="page-link">2</a>
            </li>

            <li class="page-item">
                <a class="page-link">Next</a>
            </li>

        </ul>
    </nav>

</div>

<script src="script.js"></script>

</body>
</html>
